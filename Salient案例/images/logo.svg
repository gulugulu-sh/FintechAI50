<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="white" stroke="#E5E7EB" stroke-width="2"/>

  <!-- Main icon: stylized S with audio waveform concept -->
  <g id="salient-icon">
    <!-- S shape (top curve) -->
    <path d="M 35 30 Q 50 25 55 35 Q 60 45 45 50 Q 35 52 35 60"
          fill="none" stroke="url(#primaryGradient)" stroke-width="5" stroke-linecap="round"/>

    <!-- S shape (bottom curve) -->
    <path d="M 35 60 Q 35 68 45 70 Q 60 75 55 85 Q 50 95 35 90"
          fill="none" stroke="url(#primaryGradient)" stroke-width="5" stroke-linecap="round"/>

    <!-- Audio waveform accent (representing AI voice) -->
    <g id="waveform">
      <!-- Left wave -->
      <path d="M 70 55 Q 75 50 75 60" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
      <!-- Center wave (larger) -->
      <path d="M 82 45 Q 88 45 88 60 Q 88 75 82 75" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
      <!-- Right wave -->
      <path d="M 95 55 Q 100 50 100 60" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Compliance checkmark accent -->
  <g id="compliance-mark">
    <circle cx="95" cy="95" r="12" fill="url(#accentGradient)" opacity="0.9"/>
    <path d="M 91 95 L 94 98 L 100 92" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle grid pattern for "compliance" -->
  <defs>
    <pattern id="grid" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M 4 0 L 0 0 0 4" fill="none" stroke="#F3F4F6" stroke-width="0.5"/>
    </pattern>
  </defs>
</svg>
