<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0080FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0080FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="white" filter="url(#shadow)"/>
  <circle cx="60" cy="60" r="55" fill="url(#grad1)" opacity="0.08"/>

  <!-- AI symbol: stylized brain/neural network -->
  <g transform="translate(30, 28)">
    <!-- Central node -->
    <circle cx="15" cy="12" r="3.5" fill="url(#grad1)" opacity="0.8"/>

    <!-- Top left node -->
    <circle cx="5" cy="2" r="2.5" fill="url(#grad1)" opacity="0.6"/>
    <!-- Connection line -->
    <line x1="15" y1="12" x2="5" y2="2" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Top right node -->
    <circle cx="25" cy="2" r="2.5" fill="url(#grad1)" opacity="0.6"/>
    <!-- Connection line -->
    <line x1="15" y1="12" x2="25" y2="2" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Bottom left node -->
    <circle cx="8" cy="22" r="2.5" fill="url(#grad1)" opacity="0.6"/>
    <!-- Connection line -->
    <line x1="15" y1="12" x2="8" y2="22" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Bottom right node -->
    <circle cx="22" cy="22" r="2.5" fill="url(#grad1)" opacity="0.6"/>
    <!-- Connection line -->
    <line x1="15" y1="12" x2="22" y2="22" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Additional connection between nodes -->
    <line x1="5" y1="2" x2="25" y2="2" stroke="url(#grad1)" stroke-width="1" opacity="0.2"/>
    <line x1="8" y1="22" x2="22" y2="22" stroke="url(#grad1)" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Investment/Financial symbol: upward trending chart -->
  <g transform="translate(60, 35)">
    <!-- Chart bars -->
    <rect x="0" y="8" width="5" height="12" fill="url(#grad2)" opacity="0.7" rx="1"/>
    <rect x="8" y="4" width="5" height="16" fill="url(#grad2)" opacity="0.8" rx="1"/>
    <rect x="16" y="0" width="5" height="20" fill="url(#grad2)" opacity="0.9" rx="1"/>

    <!-- Trend line -->
    <polyline points="2.5,20 11.5,12 21.5,0" stroke="url(#grad2)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Arrow tip -->
    <polygon points="21.5,0 24,-2 20,2" fill="url(#grad2)" opacity="0.9"/>
  </g>

  <!-- "A" letter for AInvest -->
  <g transform="translate(35, 60)">
    <path d="M8,0 L0,20 L4,20 L6,15 L10,15 L12,20 L16,20 L8,0 Z M7,6 L9,12 L5,12 Z" fill="url(#grad1)" opacity="0.85" stroke="url(#grad1)" stroke-width="0.5"/>
  </g>

  <!-- Data/AI intelligence symbol: dots and lines -->
  <g transform="translate(55, 65)">
    <!-- Left column -->
    <circle cx="2" cy="2" r="1.2" fill="url(#grad1)" opacity="0.8"/>
    <circle cx="2" cy="7" r="1.2" fill="url(#grad1)" opacity="0.6"/>
    <circle cx="2" cy="12" r="1.2" fill="url(#grad1)" opacity="0.4"/>
    <!-- Right column -->
    <circle cx="12" cy="2" r="1.2" fill="url(#grad1)" opacity="0.8"/>
    <circle cx="12" cy="7" r="1.2" fill="url(#grad1)" opacity="0.6"/>
    <circle cx="12" cy="12" r="1.2" fill="url(#grad1)" opacity="0.4"/>
    <!-- Connection lines -->
    <line x1="2" y1="2" x2="12" y2="2" stroke="url(#grad1)" stroke-width="0.8" opacity="0.3"/>
    <line x1="2" y1="7" x2="12" y2="7" stroke="url(#grad1)" stroke-width="0.8" opacity="0.3"/>
    <line x1="2" y1="12" x2="12" y2="12" stroke="url(#grad1)" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Company name "AInvest" text (minimal, clean) -->
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="url(#grad1)" opacity="0.9">AInvest</text>

  <!-- Border accent -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.3"/>
</svg>
