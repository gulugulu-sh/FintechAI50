<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for isolation -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="#0D47A1" stroke-width="2"/>

  <!-- Shield shape (insurance symbol) -->
  <path d="M 100 40 L 140 55 L 140 105 Q 100 145 100 145 Q 100 145 60 105 L 60 55 Z" fill="white" opacity="0.1"/>

  <!-- Central "F" icon using forward arrow concept -->
  <!-- Vertical line (stem) -->
  <rect x="82" y="50" width="8" height="70" fill="white" rx="4"/>

  <!-- Horizontal lines (bars) forming "F" and forward direction -->
  <rect x="90" y="55" width="25" height="6" fill="#00C853" rx="3"/>
  <rect x="90" y="78" width="18" height="6" fill="#00C853" rx="3"/>
  <rect x="90" y="101" width="25" height="6" fill="white" rx="3"/>

  <!-- Accent dot (forward motion indicator) -->
  <circle cx="125" cy="105" r="4" fill="#00C853" opacity="0.8"/>

  <!-- Company name text area indicator (subtle) -->
  <g opacity="0.6">
    <rect x="55" y="155" width="90" height="2" fill="white" rx="1"/>
  </g>

  <!-- Additional tech accent lines (subtle AI indicator) -->
  <g opacity="0.3">
    <line x1="65" y1="135" x2="75" y2="140" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="125" y1="135" x2="135" y2="140" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Outer accent ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
</svg>
