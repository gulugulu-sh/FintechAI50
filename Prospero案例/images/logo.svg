<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A5F7F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A3F5F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F94A3E;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>

  <!-- Inner circle for contrast -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#FFF" stroke-width="1" opacity="0.2"/>

  <!-- Chart/Rising trend lines - representing AI stock analysis -->
  <g id="chart" transform="translate(70, 60)">
    <!-- Grid background -->
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="#FFF" stroke-width="0.5" opacity="0.15"/>
    <line x1="15" y1="0" x2="15" y2="80" stroke="#FFF" stroke-width="0.5" opacity="0.1"/>
    <line x1="30" y1="0" x2="30" y2="80" stroke="#FFF" stroke-width="0.5" opacity="0.1"/>
    <line x1="45" y1="0" x2="45" y2="80" stroke="#FFF" stroke-width="0.5" opacity="0.1"/>
    <line x1="0" y1="20" x2="60" y2="20" stroke="#FFF" stroke-width="0.5" opacity="0.1"/>
    <line x1="0" y1="40" x2="60" y2="40" stroke="#FFF" stroke-width="0.5" opacity="0.1"/>
    <line x1="0" y1="60" x2="60" y2="60" stroke="#FFF" stroke-width="0.5" opacity="0.1"/>

    <!-- Upward trend line with glow -->
    <polyline points="5,70 18,55 31,42 44,28 57,8"
              fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Data points on the line -->
    <circle cx="5" cy="70" r="2" fill="#FF6B35"/>
    <circle cx="18" cy="55" r="2" fill="#FF6B35"/>
    <circle cx="31" cy="42" r="2" fill="#FF6B35"/>
    <circle cx="44" cy="28" r="2" fill="#FF6B35"/>
    <circle cx="57" cy="8" r="2.5" fill="#FF6B35"/>
  </g>

  <!-- AI symbol - neural network nodes -->
  <g id="ai-nodes" transform="translate(75, 135)">
    <!-- Central node (bright) -->
    <circle cx="0" cy="0" r="4" fill="#FF6B35"/>
    <circle cx="0" cy="0" r="6" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.5"/>

    <!-- Connected nodes -->
    <circle cx="-12" cy="-8" r="2.5" fill="#FFF" opacity="0.8"/>
    <circle cx="12" cy="-8" r="2.5" fill="#FFF" opacity="0.8"/>
    <circle cx="-10" cy="10" r="2.5" fill="#FFF" opacity="0.8"/>
    <circle cx="10" cy="10" r="2.5" fill="#FFF" opacity="0.8"/>

    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-12" y2="-8" stroke="#FF6B35" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="12" y2="-8" stroke="#FF6B35" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-10" y2="10" stroke="#FF6B35" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="10" y2="10" stroke="#FF6B35" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="100" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.4"/>
  <circle cx="100" cy="100" r="98" fill="none" stroke="#FF6B35" stroke-width="0.5" opacity="0.2"/>
</svg>
