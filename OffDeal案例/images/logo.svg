<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#FFFFFF" rx="20"/>

  <!-- Primary Gradient (Blue-to-Purple) -->
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main Icon: Overlapping Deal Circles (representing buyer + seller + deal) -->
  <!-- Left circle (Seller) -->
  <circle cx="55" cy="95" r="28" fill="url(#brandGradient)" opacity="0.85"/>

  <!-- Right circle (Buyer) -->
  <circle cx="125" cy="95" r="28" fill="url(#accentGradient)" opacity="0.85"/>

  <!-- Center overlap accent -->
  <circle cx="90" cy="95" r="20" fill="#FFFFFF" opacity="0.3"/>

  <!-- AI Lightning bolt in center (symbolizing AI automation) -->
  <g transform="translate(85, 80)">
    <path d="M 5 -8 L 10 0 L 2 2 L 8 15 L -5 5 L 3 2 Z" fill="#1E40AF" opacity="0.9"/>
  </g>

  <!-- Top arc representing upward movement (growth/increase) -->
  <path d="M 45 70 Q 90 40 135 70" stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Dollar sign accent on top right -->
  <text x="155" y="50" font-size="20" font-weight="bold" fill="#06B6D4" opacity="0.8">$</text>

  <!-- Text: "OffDeal" -->
  <text x="100" y="170" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" fill="#1E40AF" text-anchor="middle" letter-spacing="-0.5">
    OffDeal
  </text>

  <!-- Subtitle: "AI Investment Bank" -->
  <text x="100" y="185" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="500" fill="#7C3AED" text-anchor="middle" opacity="0.7" letter-spacing="1">
    AI BANKING
  </text>
</svg>
