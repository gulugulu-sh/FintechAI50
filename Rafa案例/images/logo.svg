<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A4B8F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2D5A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A8CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>

  <!-- Outer ring representing network/agents -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.6"/>

  <!-- Central cluster - 5 agent nodes arranged in a circle -->
  <!-- Center agent (primary) -->
  <circle cx="100" cy="100" r="18" fill="url(#accentGradient)"/>
  <circle cx="100" cy="100" r="16" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>

  <!-- Text in center -->
  <text x="100" y="108" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">R</text>

  <!-- Surrounding agent nodes (4 agents) - positioned in quadrants -->
  <!-- Top agent -->
  <circle cx="100" cy="55" r="13" fill="url(#agentGradient)"/>
  <circle cx="100" cy="55" r="11" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>

  <!-- Right agent -->
  <circle cx="135" cy="90" r="13" fill="#FF6B35" opacity="0.9"/>
  <circle cx="135" cy="90" r="11" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>

  <!-- Bottom agent -->
  <circle cx="100" cy="145" r="13" fill="url(#agentGradient)"/>
  <circle cx="100" cy="145" r="11" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>

  <!-- Left agent -->
  <circle cx="65" cy="90" r="13" fill="#FF6B35" opacity="0.9"/>
  <circle cx="65" cy="90" r="11" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>

  <!-- Connecting lines showing agent collaboration -->
  <line x1="100" y1="82" x2="100" y2="68" stroke="#00D4FF" stroke-width="1.5" opacity="0.7" stroke-dasharray="2,2"/>
  <line x1="118" y1="90" x2="132" y2="90" stroke="#FF6B35" stroke-width="1.5" opacity="0.7" stroke-dasharray="2,2"/>
  <line x1="100" y1="118" x2="100" y2="132" stroke="#00D4FF" stroke-width="1.5" opacity="0.7" stroke-dasharray="2,2"/>
  <line x1="82" y1="90" x2="68" y2="90" stroke="#FF6B35" stroke-width="1.5" opacity="0.7" stroke-dasharray="2,2"/>

  <!-- Diagonal connections -->
  <line x1="115" y1="75" x2="130" y2="75" stroke="#00D4FF" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="115" y1="125" x2="130" y2="125" stroke="#00D4FF" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="85" y1="75" x2="70" y2="75" stroke="#00D4FF" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>
  <line x1="85" y1="125" x2="70" y2="125" stroke="#00D4FF" stroke-width="1" opacity="0.4" stroke-dasharray="2,2"/>

  <!-- Small accent indicators on each agent (showing active processing) -->
  <circle cx="100" cy="52" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="138" cy="92" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="100" cy="148" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="62" cy="92" r="3" fill="#FFFFFF" opacity="0.8"/>

  <!-- Subtle glowing effect on center -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- Top text label -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">RAFA</text>

  <!-- Bottom tagline -->
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="9" fill="#00D4FF" text-anchor="middle" opacity="0.9">AI AGENTS</text>
</svg>
