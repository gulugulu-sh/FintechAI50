<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <!-- Outer square background (Hebbia corporate blue) -->
    <rect width="200" height="200" rx="32" fill="#2C3E7F"/>

    <!-- Inner gradient overlay for depth -->
    <defs>
        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3D4F8F;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1A2B5E;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6B8FD9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4A6CB8;stop-opacity:1" />
        </linearGradient>
    </defs>

    <rect width="200" height="200" rx="32" fill="url(#logoGradient)"/>

    <!-- Primary geometric shape: "H" stylized as connected nodes and pathways (representing Agentic connections) -->
    <g transform="translate(100, 100)">
        <!-- Left vertical bar -->
        <rect x="-45" y="-55" width="18" height="110" rx="9" fill="url(#accentGradient)"/>

        <!-- Right vertical bar -->
        <rect x="27" y="-55" width="18" height="110" rx="9" fill="url(#accentGradient)"/>

        <!-- Horizontal bridge (representing AI pathways) -->
        <rect x="-36" y="-8" width="72" height="16" rx="8" fill="url(#accentGradient)"/>

        <!-- Connection nodes (representing Agentic AI layers) -->
        <circle cx="-36" cy="-8" r="7" fill="#FFB84D" opacity="0.8"/>
        <circle cx="0" cy="-8" r="6" fill="#FFB84D" opacity="0.9"/>
        <circle cx="36" cy="-8" r="7" fill="#FFB84D" opacity="0.8"/>
    </g>

    <!-- Text label at bottom -->
    <text x="100" y="175" font-family="Inter, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">HEBBIA</text>
</svg>
