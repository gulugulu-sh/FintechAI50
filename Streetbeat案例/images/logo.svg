<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#FFFFFF" stroke="#1F2937" stroke-width="2"/>

  <!-- Brand gradient defs -->
  <defs>
    <linearGradient id="streetbeatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- AI Agent symbol - upward trending line with nodes -->
  <g transform="translate(50, 80)">
    <!-- Base trend line representing market movement -->
    <path d="M 10 50 Q 25 35 40 25 T 70 5" stroke="url(#streetbeatGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Data points/nodes on the line -->
    <circle cx="10" cy="50" r="5" fill="#0EA5E9"/>
    <circle cx="40" cy="25" r="5" fill="#06B6D4"/>
    <circle cx="70" cy="5" r="5" fill="#06B6D4"/>

    <!-- AI agent indicator - orbiting circles -->
    <circle cx="40" cy="25" r="12" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
    <circle cx="40" cy="25" r="8" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.4"/>

    <!-- Dots representing multiple agents in network -->
    <g opacity="0.8">
      <circle cx="25" cy="35" r="2.5" fill="#F59E0B"/>
      <circle cx="55" cy="15" r="2.5" fill="#F59E0B"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(100, 160)" text-anchor="middle">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1F2937">STREETBEAT</text>
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" letter-spacing="1">AI WEALTH</text>
  </g>
</svg>
