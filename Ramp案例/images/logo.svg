<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#1a3731" rx="20"/>

  <!-- Ramp symbol - upward curve (ramp trajectory) -->
  <path d="M 60 140 Q 100 80 140 60" stroke="#2D9B7E" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Platform base -->
  <rect x="60" y="140" width="80" height="10" fill="#2D9B7E" rx="2"/>

  <!-- Corner accent -->
  <rect x="130" y="140" width="10" height="20" fill="#FFE36D" rx="2"/>
</svg>
