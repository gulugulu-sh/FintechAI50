<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="100" fill="#0F172A"/>

  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00A8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E72;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Uptrend Lines (Chart visualization) -->
  <g stroke="url(#mainGradient)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 45 120 L 55 100 L 65 110 L 75 85"/>
  </g>

  <!-- Downtrend Lines -->
  <g stroke="url(#mainGradient)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M 50 140 L 60 135 L 70 145 L 80 140"/>
  </g>

  <!-- Central Trading Core -->
  <circle cx="100" cy="100" r="25" fill="url(#mainGradient)" opacity="0.85"/>
  <circle cx="100" cy="100" r="15" fill="#0F172A"/>

  <!-- Trading Nodes (Buy/Sell signals) -->
  <g fill="#00D9FF">
    <circle cx="85" cy="85" r="5" opacity="0.8"/>
    <circle cx="115" cy="115" r="5" opacity="0.8"/>
  </g>

  <!-- Accent Signal Points (Red for execution) -->
  <circle cx="130" cy="75" r="4" fill="url(#accentGradient)"/>
  <circle cx="70" cy="130" r="4" fill="url(#accentGradient)"/>

  <!-- Network Connections -->
  <g stroke="#00A8FF" stroke-width="1.5" opacity="0.5">
    <line x1="100" y1="100" x2="130" y2="75"/>
    <line x1="100" y1="100" x2="70" y2="130"/>
    <line x1="85" y1="85" x2="115" y2="115"/>
  </g>

  <!-- Outer Ring (Growth indicator) -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.35" stroke-dasharray="5,5"/>

  <!-- AI Tech Indicator - Geometric Pattern -->
  <g fill="none" stroke="#FF8E72" stroke-width="1.5" opacity="0.6">
    <path d="M 100 50 L 110 60 L 100 70 L 90 60 Z"/>
  </g>

  <!-- Additional depth elements -->
  <circle cx="100" cy="100" r="35" fill="none" stroke="url(#mainGradient)" stroke-width="1" opacity="0.25"/>
</svg>
