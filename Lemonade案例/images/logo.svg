<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Brand Pink Lemonade Circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#FF0083" stroke-width="2"/>

  <!-- Lemon Shape -->
  <g transform="translate(100, 85)">
    <!-- Main lemon body -->
    <ellipse cx="0" cy="0" rx="32" ry="35" fill="#FFE922" stroke="#FF0083" stroke-width="1.5"/>

    <!-- Lemon bumps for texture -->
    <circle cx="-18" cy="-15" r="4" fill="#FFD700" opacity="0.8"/>
    <circle cx="18" cy="-15" r="4" fill="#FFD700" opacity="0.8"/>
    <circle cx="-22" cy="5" r="3" fill="#FFD700" opacity="0.8"/>
    <circle cx="22" cy="5" r="3" fill="#FFD700" opacity="0.8"/>
    <circle cx="0" cy="25" r="3" fill="#FFD700" opacity="0.8"/>

    <!-- Lemon shine -->
    <ellipse cx="-10" cy="-10" rx="12" ry="15" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Straw (pink) -->
  <g transform="translate(100, 70)">
    <rect x="-3" y="-15" width="6" height="35" fill="#FF0083" rx="3"/>
    <!-- Straw shine -->
    <rect x="-2" y="-15" width="2" height="35" fill="#FFFFFF" opacity="0.3" rx="1"/>
  </g>

  <!-- Company Name -->
  <text x="100" y="155" font-family="'Inter', Arial, sans-serif" font-size="24" font-weight="800" text-anchor="middle" fill="#FF0083">Lemonade</text>

  <!-- Tagline -->
  <text x="100" y="175" font-family="'Inter', Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1A1514" opacity="0.6">AI-NATIVE INSURANCE</text>
</svg>
