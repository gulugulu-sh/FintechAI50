<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="mintGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1DD1A1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B894;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="techBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0984E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D3436;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#F8F9FA" opacity="0.5"/>

  <!-- Left cross element (stylized X) -->
  <g opacity="0.95">
    <!-- Vertical bar with mint gradient -->
    <rect x="75" y="55" width="12" height="90" rx="6" fill="url(#mintGreen)" filter="url(#shadow)"/>

    <!-- Horizontal bar with tech blue gradient -->
    <rect x="55" y="85" width="90" height="12" rx="6" fill="url(#techBlue)" filter="url(#shadow)"/>
  </g>

  <!-- Circular accent ring -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#1DD1A1" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="#0984E3" stroke-width="1" opacity="0.2"/>

  <!-- Center dot (convergence point) -->
  <circle cx="100" cy="100" r="4" fill="#1DD1A1"/>
  <circle cx="100" cy="100" r="3" fill="#0984E3" opacity="0.6"/>

  <!-- Top accent arrow/chevron -->
  <path d="M 100 45 L 105 55 L 95 55 Z" fill="#1DD1A1" opacity="0.8"/>

  <!-- Bottom accent arrow/chevron -->
  <path d="M 100 155 L 105 145 L 95 145 Z" fill="#0984E3" opacity="0.8"/>

  <!-- Company text option (can be toggled) -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2D3436">
    CROSSMINT
  </text>
</svg>
