<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cascadeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F6FEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B47A3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D93C1E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="100" fill="#F5F7FA"/>

  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="80" height="20" rx="4" fill="url(#cascadeGrad)" filter="url(#shadow)"/>
    <circle cx="10" cy="10" r="4" fill="#fff" opacity="0.8"/>
    <circle cx="25" cy="10" r="4" fill="#fff" opacity="0.8"/>
    <circle cx="40" cy="10" r="4" fill="#fff" opacity="0.8"/>

    <rect x="10" y="25" width="80" height="20" rx="4" fill="url(#cascadeGrad)" opacity="0.85" filter="url(#shadow)"/>
    <path d="M 20 35 L 25 30 L 30 35 M 40 35 L 45 30 L 50 35" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="20" y="50" width="80" height="20" rx="4" fill="url(#cascadeGrad)" opacity="0.7" filter="url(#shadow)"/>
    <circle cx="35" cy="60" r="3.5" fill="url(#accentGrad)"/>
    <circle cx="50" cy="60" r="3.5" fill="url(#accentGrad)"/>
    <circle cx="65" cy="60" r="3.5" fill="url(#accentGrad)"/>

    <path d="M 30 20 L 25 25" stroke="#D93C1E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <path d="M 50 45 L 45 50" stroke="#D93C1E" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <text x="100" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#0B47A3">CascadingAI</text>
  <text x="100" y="182" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666" letter-spacing="1">AI LENDING</text>
</svg>
