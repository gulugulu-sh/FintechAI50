<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <!-- Rising sun gradient (Huatai red to orange) -->
    <linearGradient id="sunGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#C4002B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E31C23;stop-opacity:1" />
    </linearGradient>

    <!-- Background gradient (dark blue) -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004d99;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark blue background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="none"/>

  <!-- Rising sun (larger, lower position) -->
  <circle cx="100" cy="120" r="45" fill="url(#sunGradient)" opacity="0.95"/>

  <!-- Sun rays/light effect -->
  <g opacity="0.3">
    <line x1="100" y1="70" x2="100" y2="50" stroke="url(#sunGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="135" y1="85" x2="150" y2="70" stroke="url(#sunGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="150" y1="120" x2="170" y2="120" stroke="url(#sunGradient)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Stylized "H" representing "Huatai" (人 character merged with H) -->
  <g fill="white" opacity="0.9">
    <!-- Left vertical bar of H -->
    <rect x="60" y="35" width="8" height="65" rx="4" fill="white"/>

    <!-- Right vertical bar of H -->
    <rect x="72" y="35" width="8" height="65" rx="4" fill="white"/>

    <!-- Horizontal bar of H -->
    <rect x="60" y="60" width="20" height="6" rx="3" fill="white"/>

    <!-- Top curve suggesting upward movement -->
    <path d="M 60 42 Q 64 32 68 32 Q 72 32 76 42" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- "AI涨乐" text indicator (subtle, bottom right) -->
  <text x="155" y="180" font-family="'Inter', Arial, sans-serif" font-size="10" font-weight="600" fill="white" opacity="0.7" text-anchor="end">AI</text>

  <!-- Accent dots (representing growth/data points) -->
  <g fill="#FFD700" opacity="0.6">
    <circle cx="130" cy="95" r="3"/>
    <circle cx="145" cy="110" r="2.5"/>
    <circle cx="125" cy="130" r="2"/>
  </g>
</svg>
