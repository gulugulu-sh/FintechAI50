<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f8fafb"/>

  <!-- Main geometric symbol: upward trending arrow + circuit pattern -->
  <defs>
    <linearGradient id="upstartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8b5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Central upward arrow shape symbolizing growth and trust -->
  <path d="M 100 40 L 140 100 L 120 100 L 120 160 L 80 160 L 80 100 L 60 100 Z" fill="url(#upstartGradient)" opacity="0.9"/>

  <!-- Accent circuit dots (AI/technology elements) -->
  <circle cx="55" cy="70" r="4" fill="#0066cc" opacity="0.6"/>
  <circle cx="145" cy="70" r="4" fill="#00a8b5" opacity="0.6"/>
  <circle cx="100" cy="170" r="4" fill="#0066cc" opacity="0.6"/>

  <!-- Connecting circuit lines -->
  <line x1="59" y1="70" x2="80" y2="85" stroke="#00a8b5" stroke-width="2" opacity="0.4"/>
  <line x1="141" y1="70" x2="120" y2="85" stroke="#0066cc" stroke-width="2" opacity="0.4"/>
  <line x1="100" y1="165" x2="100" y2="145" stroke="#00a8b5" stroke-width="2" opacity="0.4"/>

  <!-- Company name -->
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#0066cc">
    UPSTART
  </text>
</svg>
