<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#FFFFFF" rx="28"/>

  <!-- 蚂蚁蓝 Primary Color Background -->
  <circle cx="100" cy="100" r="95" fill="#1E50A2" opacity="0.95"/>

  <!-- Ant Icon (Head) -->
  <circle cx="100" cy="60" r="18" fill="#FFFFFF"/>

  <!-- Ant Eyes -->
  <circle cx="95" cy="57" r="3" fill="#1E50A2"/>
  <circle cx="105" cy="57" r="3" fill="#1E50A2"/>

  <!-- Ant Body (Main Segment) -->
  <ellipse cx="100" cy="95" rx="16" ry="20" fill="#FFFFFF"/>

  <!-- Ant Abdomen -->
  <ellipse cx="100" cy="130" rx="14" ry="18" fill="#FFFFFF" opacity="0.9"/>

  <!-- Left Antenna -->
  <path d="M 92 45 Q 78 35 75 20" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Right Antenna -->
  <path d="M 108 45 Q 122 35 125 20" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Left Front Leg -->
  <path d="M 88 105 L 70 125" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Right Front Leg -->
  <path d="M 112 105 L 130 125" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Left Back Leg -->
  <path d="M 85 130 L 60 150" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Right Back Leg -->
  <path d="M 115 130 L 140 150" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Optional: Small treasure/wealth symbol near ant -->
  <g transform="translate(120, 110)">
    <!-- Small coin shape -->
    <circle cx="0" cy="0" r="8" fill="#FFD700" stroke="#1E50A2" stroke-width="1.5"/>
    <text x="0" y="2.5" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E50A2">¥</text>
  </g>

  <!-- Text below (optional, can be removed) -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1E50A2">
    蚂蚁财富
  </text>
</svg>
