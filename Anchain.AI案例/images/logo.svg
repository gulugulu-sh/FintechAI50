<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E5090;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0A6FB8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006BA8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F74C2C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#E8F0F7" stroke-width="2" opacity="0.5"/>

  <!-- Main shield/security symbol -->
  <g transform="translate(100, 100)">
    <!-- Outer shield -->
    <path d="M 0 -55 L 35 -35 L 35 -5 C 35 15 0 40 0 40 C 0 40 -35 15 -35 -5 L -35 -35 Z"
          fill="url(#chainGradient)" opacity="0.15"/>

    <!-- Chain links representing blockchain -->
    <!-- Top link -->
    <g opacity="0.9">
      <circle cx="0" cy="-40" r="8" fill="none" stroke="url(#chainGradient)" stroke-width="2.5"/>
      <circle cx="0" cy="-40" r="3" fill="url(#chainGradient)"/>
    </g>

    <!-- Middle-left link -->
    <g opacity="0.9">
      <circle cx="-18" cy="-20" r="8" fill="none" stroke="url(#chainGradient)" stroke-width="2.5"/>
      <circle cx="-18" cy="-20" r="3" fill="url(#chainGradient)"/>
    </g>

    <!-- Middle-right link -->
    <g opacity="0.9">
      <circle cx="18" cy="-20" r="8" fill="none" stroke="url(#chainGradient)" stroke-width="2.5"/>
      <circle cx="18" cy="-20" r="3" fill="url(#chainGradient)"/>
    </g>

    <!-- Bottom-left link -->
    <g opacity="0.9">
      <circle cx="-18" cy="12" r="8" fill="none" stroke="url(#chainGradient)" stroke-width="2.5"/>
      <circle cx="-18" cy="12" r="3" fill="url(#chainGradient)"/>
    </g>

    <!-- Bottom-right link -->
    <g opacity="0.9">
      <circle cx="18" cy="12" r="8" fill="none" stroke="url(#chainGradient)" stroke-width="2.5"/>
      <circle cx="18" cy="12" r="3" fill="url(#chainGradient)"/>
    </g>

    <!-- AI lightning bolt / neural accent -->
    <g opacity="0.85">
      <!-- Left part of zigzag -->
      <line x1="-8" y1="-8" x2="-3" y2="5" stroke="url(#accentGradient)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Right part of zigzag -->
      <line x1="-3" y1="5" x2="8" y2="-2" stroke="url(#accentGradient)" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Bottom part -->
      <line x1="8" y1="-2" x2="2" y2="15" stroke="url(#accentGradient)" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Connecting lines for blockchain network effect -->
    <g stroke="url(#chainGradient)" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
      <line x1="0" y1="-40" x2="-18" y2="-20"/>
      <line x1="0" y1="-40" x2="18" y2="-20"/>
      <line x1="-18" y1="-20" x2="-18" y2="12"/>
      <line x1="18" y1="-20" x2="18" y2="12"/>
    </g>
  </g>

  <!-- Protective ring at bottom -->
  <circle cx="100" cy="150" r="12" fill="url(#accentGradient)" opacity="0.3"/>
  <circle cx="100" cy="150" r="12" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" opacity="0.6"/>
</svg>
