<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D97757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E89968;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#20B2AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#FAF7F2" stroke="url(#brandGradient)" stroke-width="2"/>

  <!-- Shield shape representing protection/trust -->
  <g transform="translate(100, 100)">
    <!-- Shield outline -->
    <path d="M -35 -25 L -35 10 Q 0 35 35 35 Q 0 35 0 45 Q 0 35 -35 35 Q 0 10 -35 -25"
          fill="none" stroke="url(#brandGradient)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- AI symbol - Neural network inspired -->
    <g transform="translate(0, 5)">
      <!-- Central node -->
      <circle cx="0" cy="0" r="5" fill="url(#brandGradient)"/>

      <!-- Upper nodes -->
      <circle cx="-12" cy="-12" r="3.5" fill="url(#accentGradient)"/>
      <circle cx="12" cy="-12" r="3.5" fill="url(#accentGradient)"/>

      <!-- Lower nodes -->
      <circle cx="-10" cy="10" r="3.5" fill="url(#accentGradient)"/>
      <circle cx="10" cy="10" r="3.5" fill="url(#accentGradient)"/>

      <!-- Connecting lines -->
      <line x1="0" y1="0" x2="-12" y2="-12" stroke="url(#brandGradient)" stroke-width="1.2" opacity="0.8"/>
      <line x1="0" y1="0" x2="12" y2="-12" stroke="url(#brandGradient)" stroke-width="1.2" opacity="0.8"/>
      <line x1="0" y1="0" x2="-10" y2="10" stroke="url(#brandGradient)" stroke-width="1.2" opacity="0.8"/>
      <line x1="0" y1="0" x2="10" y2="10" stroke="url(#brandGradient)" stroke-width="1.2" opacity="0.8"/>

      <!-- Cross link for comprehensive coverage -->
      <line x1="-12" y1="-12" x2="12" y2="-12" stroke="url(#accentGradient)" stroke-width="0.8" opacity="0.6"/>
      <line x1="-10" y1="10" x2="10" y2="10" stroke="url(#accentGradient)" stroke-width="0.8" opacity="0.6"/>
    </g>

    <!-- Checkmark for certification -->
    <g transform="translate(20, -15)">
      <circle cx="0" cy="0" r="7" fill="white" stroke="url(#brandGradient)" stroke-width="1.5"/>
      <path d="M -3 0 L -1 2 L 3 -2" fill="none" stroke="url(#brandGradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Company name below -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="18" font-weight="700"
        text-anchor="middle" fill="#2A2A2A" letter-spacing="2">
    AIUC
  </text>

  <!-- Tagline -->
  <text x="100" y="178" font-family="Arial, sans-serif" font-size="8" font-weight="500"
        text-anchor="middle" fill="#D97757" letter-spacing="0.5" opacity="0.8">
    AI TRUST INFRASTRUCTURE
  </text>
</svg>
