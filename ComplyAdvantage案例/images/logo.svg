<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.08"/>

  <!-- Shield shape (symbol of compliance/protection) -->
  <g transform="translate(100, 100)">
    <!-- Outer shield -->
    <path d="M 0,-40 L 25,-25 L 25,10 Q 0,35 0,35 Q 0,35 -25,10 L -25,-25 Z"
          fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Inner shield (lighter) -->
    <path d="M 0,-35 L 20,-22 L 20,8 Q 0,30 0,30 Q 0,30 -20,8 L -20,-22 Z"
          fill="url(#grad2)" opacity="0.15"/>

    <!-- Checkmark (verification symbol) -->
    <g transform="translate(0, 0)" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -8,0 L -2,6 L 10,-4"/>
    </g>

    <!-- Network nodes (AI/data connectivity) -->
    <circle cx="-15" cy="-15" r="1.5" fill="url(#grad2)" opacity="0.6"/>
    <circle cx="15" cy="-15" r="1.5" fill="url(#grad2)" opacity="0.6"/>
    <circle cx="0" cy="20" r="1.5" fill="url(#grad2)" opacity="0.6"/>

    <!-- Connecting lines -->
    <line x1="-15" y1="-15" x2="0" y2="5" stroke="url(#grad2)" stroke-width="0.8" opacity="0.4"/>
    <line x1="15" y1="-15" x2="0" y2="5" stroke="url(#grad2)" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Company name (optional, can be removed for icon-only use) -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold"
        fill="#1E40AF" text-anchor="middle" letter-spacing="0.5">
    ComplyAdvantage
  </text>
</svg>
