<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="payosGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4285f4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97757;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2185b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="100" cy="100" r="95" fill="url(#payosGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1a73e8" stroke-width="1" opacity="0.3"/>

  <!-- Main Icon: Digital Agent Token (stylized) -->
  <!-- Center circular token -->
  <circle cx="100" cy="100" r="45" fill="url(#payosGradient)" opacity="0.9"/>
  <circle cx="100" cy="100" r="42" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Inner circuit-like design representing Agentic Token -->
  <path d="M 75 100 Q 85 85 100 85 Q 115 85 125 100" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 75 100 Q 85 115 100 115 Q 115 115 125 100" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Horizontal token flow lines -->
  <line x1="60" y1="100" x2="75" y2="100" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="125" y1="100" x2="140" y2="100" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- Small nodes representing AI agents -->
  <circle cx="60" cy="100" r="4" fill="url(#accentGradient)"/>
  <circle cx="140" cy="100" r="4" fill="url(#accentGradient)"/>

  <!-- Top accent: Payment gateway symbol -->
  <path d="M 100 50 L 108 65 L 92 65 Z" fill="#ffffff" opacity="0.8"/>
  <circle cx="100" cy="60" r="3" fill="url(#accentGradient)"/>

  <!-- Bottom accent: Shield/Security -->
  <path d="M 100 140 L 88 150 L 88 160 Q 100 168 112 160 L 112 150 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  <circle cx="100" cy="155" r="2" fill="#ffffff"/>

  <!-- Outer rings - representing network -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#1a73e8" stroke-width="1" opacity="0.2" stroke-dasharray="3,2"/>
  <circle cx="100" cy="100" r="75" fill="none" stroke="#d97757" stroke-width="1" opacity="0.15" stroke-dasharray="5,3"/>

  <!-- Text indicator -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a73e8" opacity="0.6">PayOS</text>

  <!-- Decorative elements: Small orbiting dots representing agents -->
  <circle cx="150" cy="80" r="2.5" fill="#d97757" opacity="0.7"/>
  <circle cx="150" cy="120" r="2.5" fill="#d97757" opacity="0.7"/>
  <circle cx="50" cy="75" r="2.5" fill="#d97757" opacity="0.7"/>
  <circle cx="50" cy="125" r="2.5" fill="#d97757" opacity="0.7"/>
</svg>
