<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#FAF7F2" rx="20"/>

  <!-- Main symbol - Abstract rabbit/hare in motion with AI concept -->
  <g id="symbol">
    <!-- Left ear - signal strength indicator -->
    <path d="M 65 45 Q 60 30 70 25 Q 75 28 73 50 Q 72 60 65 65" fill="none" stroke="#D97757" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right ear - signal strength indicator -->
    <path d="M 135 45 Q 140 30 130 25 Q 125 28 127 50 Q 128 60 135 65" fill="none" stroke="#D97757" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Head circle -->
    <circle cx="100" cy="90" r="35" fill="none" stroke="#D97757" stroke-width="4"/>

    <!-- Eyes - representing insight/vision -->
    <circle cx="88" cy="82" r="5" fill="#D97757"/>
    <circle cx="112" cy="82" r="5" fill="#D97757"/>

    <!-- Muzzle accent -->
    <circle cx="100" cy="105" r="8" fill="none" stroke="#D97757" stroke-width="3"/>

    <!-- Body - dynamic form suggesting speed/efficiency -->
    <path d="M 75 120 Q 70 145 85 165" fill="none" stroke="#20B2AA" stroke-width="4" stroke-linecap="round"/>
    <path d="M 100 125 Q 100 150 100 170" fill="none" stroke="#20B2AA" stroke-width="4" stroke-linecap="round"/>
    <path d="M 125 120 Q 130 145 115 165" fill="none" stroke="#20B2AA" stroke-width="4" stroke-linecap="round"/>

    <!-- AI indicator - circuit-like elements -->
    <circle cx="58" cy="75" r="3" fill="#4A90E2" opacity="0.8"/>
    <circle cx="62" cy="70" r="2.5" fill="#4A90E2" opacity="0.6"/>
    <circle cx="138" cy="75" r="3" fill="#4A90E2" opacity="0.8"/>
    <circle cx="142" cy="70" r="2.5" fill="#4A90E2" opacity="0.6"/>

    <!-- Movement lines suggesting speed/intelligence -->
    <path d="M 40 90 Q 45 88 50 90" fill="none" stroke="#D97757" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 150 90 Q 155 88 160 90" fill="none" stroke="#D97757" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Decorative corner elements -->
  <circle cx="15" cy="15" r="2" fill="#D97757" opacity="0.4"/>
  <circle cx="185" cy="15" r="2" fill="#D97757" opacity="0.4"/>
  <circle cx="15" cy="185" r="2" fill="#D97757" opacity="0.4"/>
  <circle cx="185" cy="185" r="2" fill="#D97757" opacity="0.4"/>
</svg>
