<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="koyfin-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F5A73;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E84C1F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#FFFFFF" stroke="#2E7D99" stroke-width="2"/>

  <!-- Main icon: stylized chart/data visualization -->
  <!-- Left ascending bar -->
  <rect x="45" y="85" width="15" height="50" rx="3" fill="url(#koyfin-gradient)"/>

  <!-- Middle bar -->
  <rect x="70" y="70" width="15" height="65" rx="3" fill="url(#accent-gradient)"/>

  <!-- Right descending bar -->
  <rect x="95" y="80" width="15" height="55" rx="3" fill="url(#koyfin-gradient)"/>

  <!-- Far right bar -->
  <rect x="120" y="65" width="15" height="70" rx="3" fill="url(#accent-gradient)"/>

  <!-- Upward trend line connecting peaks -->
  <polyline points="60,80 85,60 110,75 135,55" stroke="#2E7D99" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI spark indicator - small lightning bolt in corner -->
  <path d="M 145 35 L 150 45 L 147 45 L 155 60 L 140 48 L 143 48 Z" fill="#FF6B35"/>

  <!-- Data points (dots on trend line) -->
  <circle cx="60" cy="80" r="3" fill="#FF6B35"/>
  <circle cx="85" cy="60" r="3" fill="#2E7D99"/>
  <circle cx="110" cy="75" r="3" fill="#FF6B35"/>
  <circle cx="135" cy="55" r="3" fill="#2E7D99"/>

  <!-- Bottom text area -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2E7D99">KOYFIN</text>
  <text x="100" y="182" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666666">Financial Data AI</text>
</svg>
