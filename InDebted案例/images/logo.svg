<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Background circle -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.95"/>

  <!-- Accent circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#grad2)" stroke-width="2" opacity="0.6"/>

  <!-- Central upward arrow symbolizing recovery/growth -->
  <path d="M 100 60 L 120 85 L 110 85 L 110 130 L 90 130 L 90 85 L 80 85 Z"
        fill="white" opacity="0.9"/>

  <!-- AI nodes/network elements around the arrow -->
  <!-- Left node -->
  <circle cx="65" cy="100" r="5" fill="url(#grad2)" opacity="0.8"/>
  <line x1="80" y1="100" x2="70" y2="100" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>

  <!-- Right node -->
  <circle cx="135" cy="100" r="5" fill="url(#grad2)" opacity="0.8"/>
  <line x1="120" y1="100" x2="130" y2="100" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>

  <!-- Top node -->
  <circle cx="100" cy="55" r="4" fill="url(#grad2)" opacity="0.7"/>
  <line x1="100" y1="65" x2="100" y2="59" stroke="url(#grad2)" stroke-width="1.5" opacity="0.5"/>

  <!-- Bottom-left node -->
  <circle cx="75" cy="130" r="4" fill="url(#grad2)" opacity="0.6"/>
  <line x1="85" y1="125" x2="80" y2="128" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>

  <!-- Bottom-right node -->
  <circle cx="125" cy="130" r="4" fill="url(#grad2)" opacity="0.6"/>
  <line x1="115" y1="125" x2="120" y2="128" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>

  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
