<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient definition -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F47E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2DB0;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>

  <!-- Subtle grid pattern background -->
  <g opacity="0.1" stroke="white" stroke-width="1">
    <line x1="40" y1="60" x2="160" y2="60"/>
    <line x1="40" y1="100" x2="160" y2="100"/>
    <line x1="40" y1="140" x2="160" y2="140"/>
    <line x1="60" y1="40" x2="60" y2="160"/>
    <line x1="100" y1="40" x2="100" y2="160"/>
    <line x1="140" y1="40" x2="140" y2="160"/>
  </g>

  <!-- Core AI symbol: Three interconnected nodes -->
  <!-- Left node -->
  <circle cx="65" cy="90" r="16" fill="url(#accentGradient)" filter="url(#glow)"/>
  <circle cx="65" cy="90" r="12" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>

  <!-- Center node (larger = core) -->
  <circle cx="100" cy="70" r="20" fill="url(#accentGradient)" filter="url(#glow)"/>
  <circle cx="100" cy="70" r="16" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>

  <!-- Right node -->
  <circle cx="135" cy="90" r="16" fill="url(#accentGradient)" filter="url(#glow)"/>
  <circle cx="135" cy="90" r="12" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>

  <!-- Connection lines (agent network) -->
  <line x1="65" y1="90" x2="100" y2="70" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="70" x2="135" y2="90" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="65" y1="90" x2="135" y2="90" stroke="white" stroke-width="2" opacity="0.4" stroke-dasharray="5,3"/>

  <!-- Ascending chart lines (portfolio growth metaphor) -->
  <polyline points="70,130 85,120 100,125 115,115 130,120"
            fill="none" stroke="white" stroke-width="2.5" opacity="0.9" stroke-linecap="round"/>

  <!-- Small accent circles on chart points -->
  <circle cx="70" cy="130" r="3" fill="white" opacity="0.8"/>
  <circle cx="85" cy="120" r="3" fill="white" opacity="0.8"/>
  <circle cx="100" cy="125" r="3" fill="white" opacity="0.8"/>
  <circle cx="115" cy="115" r="3" fill="white" opacity="0.8"/>
  <circle cx="130" cy="120" r="3" fill="white" opacity="0.8"/>

  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>

  <!-- Inner accent ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#accentGradient)" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>
</svg>
