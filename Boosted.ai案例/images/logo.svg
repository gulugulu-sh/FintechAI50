<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" stroke="#0F172A" stroke-width="2"/>

  <!-- Central rocket/boost icon -->
  <g filter="url(#glow)">
    <!-- Rocket body -->
    <path d="M 100 50 L 110 85 L 90 85 Z" fill="#FFFFFF" opacity="0.95"/>

    <!-- Rocket flame - top -->
    <ellipse cx="100" cy="90" rx="8" ry="12" fill="#FF6B35" opacity="0.9"/>
    <ellipse cx="100" cy="95" rx="6" ry="8" fill="#FFA500" opacity="0.8"/>

    <!-- Rocket flame - bottom -->
    <ellipse cx="100" cy="140" rx="6" ry="10" fill="#FF4500" opacity="0.85"/>
    <ellipse cx="100" cy="145" rx="4" ry="6" fill="#FF6B35" opacity="0.7"/>

    <!-- Rocket windows -->
    <circle cx="100" cy="65" r="3.5" fill="#2563EB" opacity="0.6"/>
    <circle cx="100" cy="73" r="3" fill="#2563EB" opacity="0.5"/>

    <!-- AI spark elements around rocket -->
    <circle cx="75" cy="70" r="2.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="125" cy="75" r="2" fill="#FFD700" opacity="0.7"/>
    <circle cx="70" cy="100" r="1.8" fill="#FFD700" opacity="0.6"/>
    <circle cx="130" cy="95" r="2.2" fill="#FFD700" opacity="0.75"/>

    <!-- Connecting lines for network effect -->
    <line x1="75" y1="70" x2="100" y2="80" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <line x1="125" y1="75" x2="100" y2="85" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <line x1="70" y1="100" x2="90" y2="90" stroke="#FFD700" stroke-width="0.8" opacity="0.4"/>
    <line x1="130" y1="95" x2="110" y2="85" stroke="#FFD700" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Outer ring accent -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#60A5FA" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>

  <!-- Corner accelerator marks (suggesting speed/boost) -->
  <g stroke="#FFFFFF" stroke-width="1.5" opacity="0.4">
    <!-- Top mark -->
    <line x1="100" y1="10" x2="100" y2="20"/>
    <!-- Right mark -->
    <line x1="190" y1="100" x2="180" y2="100"/>
    <!-- Bottom mark -->
    <line x1="100" y1="190" x2="100" y2="180"/>
    <!-- Left mark -->
    <line x1="10" y1="100" x2="20" y2="100"/>
  </g>
</svg>
