<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background Circle -->
  <circle cx="128" cy="128" r="128" fill="#FFFFFF" stroke="#D97757" stroke-width="2"/>

  <!-- Primary Brand Colors: #D97757 (terracotta) and #FAF7F2 (warm cream) -->

  <!-- Stylized Upward Arrow/Chart representing growth -->
  <g transform="translate(128, 128)">
    <!-- Base line (downtrend) -->
    <polyline points="-35,-25 -15,-15 5,-20 25,-8 45,-15"
              fill="none" stroke="#D97757" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

    <!-- Main uptrend line (sharp recovery) -->
    <polyline points="-35,-25 -15,-15 5,-20 25,-8 45,15"
              fill="none" stroke="#D97757" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Upward arrow point -->
    <polygon points="45,15 40,0 50,0" fill="#D97757"/>

    <!-- Holly AI indicator - small circle at peak -->
    <circle cx="45" cy="15" r="6" fill="#D97757" opacity="0.3"/>
    <circle cx="45" cy="15" r="4" fill="#D97757"/>

    <!-- Signal dots (representing real-time data) -->
    <circle cx="-15" cy="-15" r="3" fill="#D97757" opacity="0.6"/>
    <circle cx="5" cy="-20" r="3" fill="#D97757" opacity="0.7"/>
    <circle cx="25" cy="-8" r="3" fill="#D97757" opacity="0.8"/>
    <circle cx="45" cy="15" r="3" fill="#D97757"/>

    <!-- AI indicator lines (representing AI processing) -->
    <line x1="-40" y1="35" x2="-10" y2="35" stroke="#D97757" stroke-width="2" opacity="0.3"/>
    <line x1="-8" y1="35" x2="8" y2="35" stroke="#D97757" stroke-width="2" opacity="0.5"/>
    <line x1="10" y1="35" x2="35" y2="35" stroke="#D97757" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Company Name -->
  <text x="128" y="210" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        text-anchor="middle" fill="#2D2D2D">Trade Ideas</text>

  <!-- Tagline -->
  <text x="128" y="230" font-family="Arial, sans-serif" font-size="10"
        text-anchor="middle" fill="#D97757" opacity="0.7">AI-Powered Trading Signals</text>
</svg>
